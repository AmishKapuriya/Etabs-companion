<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETABS Structural Design Bento Dashboard — Companion Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#f8fafc;
    --panel:rgba(15, 17, 26, 0.85); /* Dark Glass Bento */
    --panel-2:rgba(25, 29, 44, 0.75);
    --panel-3:rgba(40, 46, 68, 0.65);
    --rule:rgba(0, 240, 255, 0.12);
    --rule-strong:rgba(0, 240, 255, 0.25);
    --paper:#f8fafc;
    --muted:#00f0ff;
    --bg-radial:radial-gradient(circle at 50% 0%, #08090d 0%, #030406 100%);
    --bg-grid-color:rgba(0, 240, 255, 0.03);
    
    --rust:#ff5e00; /* Vibrant tactical orange */
    --rust-grad:linear-gradient(135deg, #ff5e00, #ff8a00);
    --rust-dim:rgba(255, 94, 0, 0.08);
    --rust-glow:0 0 20px rgba(255, 94, 0, 0.25);
    
    --brass:#fbbf24;
    --olive:#00ff66; /* Neon Green */
    --olive-dim:rgba(0, 255, 102, 0.08);
    
    --amber:#fbbf24;
    --amber-dim:rgba(251, 191, 36, 0.08);
    
    --danger:#ff007f; /* Hot Magenta */
    --danger-dim:rgba(255, 0, 127, 0.08);
    
    --orb-color-1:#00f0ff; /* Cyan */
    --orb-color-2:#ff007f; /* Hot Pink */
    --orb-opacity:0.15;
    --video-opacity:0.25;
    
    --font-display:'Plus Jakarta Sans', sans-serif;
    --font-body:'Plus Jakarta Sans', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  body.light-theme {
    --ink:#1e2433; /* Soft dark charcoal */
    --panel:rgba(250, 249, 246, 0.75); /* Soft Warm Linen Glass */
    --panel-2:rgba(255, 255, 255, 0.85);
    --panel-3:rgba(255, 255, 255, 0.95);
    --rule:rgba(30, 36, 51, 0.05);
    --rule-strong:rgba(30, 36, 51, 0.1);
    --paper:#fdfdfc;
    --muted:#5c6475;
    --bg-radial:radial-gradient(circle at 50% 0%, #f5f3ef 0%, #eae7e1 100%);
    --bg-grid-color:rgba(30, 36, 51, 0.015);
    
    --brass:#b45309;
    --olive:#166534;
    --olive-dim:rgba(22, 163, 74, 0.06);
    
    --amber:#9a3412;
    --amber-dim:rgba(154, 52, 18, 0.06);
    
    --danger:#991b1b;
    --danger-dim:rgba(153, 27, 27, 0.06);
    
    --orb-color-1:#fed7aa;
    --orb-color-2:#e0f2fe;
    --orb-opacity:0.65;
    --video-opacity:0.04;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg-radial);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:14.5px;
    line-height:1.6;
    min-height:100vh;
    padding:80px 20px 20px 20px; /* Space for the marquee banner */
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow-x:hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Scrolling Marquee Header */
  .marquee-bar {
    width: 100%;
    background: #0c0d12;
    border-bottom: 2px solid var(--muted);
    overflow: hidden;
    white-space: nowrap;
    padding: 10px 0;
    box-shadow: 0 4px 20px rgba(0, 240, 255, 0.15);
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }
  body.light-theme .marquee-bar {
    background: #fdfdfc;
    border-bottom-color: var(--rule-strong);
    box-shadow: 0 4px 20px rgba(30, 36, 51, 0.04);
  }
  .marquee-content {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    animation: marquee 20s linear infinite;
  }
  body.light-theme .marquee-content {
    color: var(--ink);
  }
  @keyframes marquee {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); }
  }
  
  /* Video Background */
  .bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
    z-index: -3;
    pointer-events: none;
    opacity: var(--video-opacity);
    mix-blend-mode: screen;
    transition: opacity 0.3s ease;
  }
  body.light-theme .bg-video {
    mix-blend-mode: multiply;
  }
  
  /* Animated scrolling grid */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: 
      linear-gradient(var(--bg-grid-color) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, var(--bg-grid-color) 1px, transparent 1px) 0 0 / 40px 40px;
    z-index: -1;
    pointer-events: none;
    animation: gridScroll 12s linear infinite;
  }
  @keyframes gridScroll {
    from { background-position: 0 0; }
    to { background-position: 0 40px; }
  }

  /* Animated floating cosmic nebula orbs */
  .bg-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: var(--orb-opacity);
    z-index: -2;
    pointer-events: none;
    transition: background 0.3s ease, opacity 0.3s ease;
  }
  .bg-glow-1 {
    width: 450px;
    height: 450px;
    background: var(--orb-color-1);
    top: -150px;
    left: -100px;
    animation: float1 25s infinite alternate ease-in-out;
  }
  .bg-glow-2 {
    width: 550px;
    height: 550px;
    background: var(--orb-color-2);
    bottom: -150px;
    right: -100px;
    animation: float2 30s infinite alternate ease-in-out;
  }
  @keyframes float1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(160px, 120px) scale(1.15); }
  }
  @keyframes float2 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-120px, -160px) scale(1.1); }
  }

  ::selection{background:rgba(0, 240, 255, 0.15);color:#fff;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
  ::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:4px;}
  a{color:var(--muted);text-decoration:none;transition:color 0.2s;}
  a:hover{color:#fff;}
  button{font-family:var(--font-body);cursor:pointer;}
  input,textarea,select{font-family:var(--font-body);}

  .app{
    width:100%;
    max-width:1280px;
    display: grid;
    grid-template-columns: 320px 16px minmax(0, 1fr);
    gap: 16px;
    animation: fadeIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 1;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width:960px){
    .app { grid-template-columns: 1fr; gap: 24px; }
  }

  /* Custom vertical scroll progress indicator + sticky wrap */
  .scroll-tracker-col {
    position: relative;
    display: flex;
    justify-content: center;
  }
  .scroll-tracker-sticky-wrap {
    position: sticky;
    top: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    height: calc(100vh - 120px);
  }
  .scroll-tracker-track {
    width: 6px;
    flex: 1;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 4px;
    overflow: hidden;
  }
  .scroll-tracker-fill {
    width: 100%;
    height: var(--scroll-pct, 0%);
    background: linear-gradient(to bottom, var(--orb-color-1), var(--orb-color-2));
    box-shadow: 0 0 12px var(--orb-color-1);
    border-radius: 4px;
    transition: height 0.05s ease-out;
  }
  .scroll-top-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
    border: 2px solid var(--rule-strong);
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 2px 2px 0px #000;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  body.light-theme .scroll-top-btn {
    border-width: 1px;
    background: #ffffff;
    box-shadow: none;
    color: var(--ink);
  }
  .scroll-top-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0px #000;
    border-color: var(--muted);
    color: #fff;
  }
  body.light-theme .scroll-top-btn:hover {
    transform: translateY(-1.5px);
    border-color: var(--rust);
  }
  .scroll-top-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px #000;
  }

  @media (max-width:960px){
    .scroll-tracker-col {
      position: fixed;
      top: 38px;
      left: 0;
      width: 100vw;
      height: 4px;
      z-index: 1000;
      display: block;
    }
    .scroll-tracker-sticky-wrap {
      position: static;
      height: 100%;
      width: 100%;
      display: block;
    }
    .scroll-tracker-track {
      width: 100%;
      height: 100%;
      position: static;
      border-radius: 0;
      border: none;
      background: rgba(255, 255, 255, 0.1);
    }
    .scroll-tracker-fill {
      height: 100% !important;
      width: var(--scroll-pct, 0%);
      background: linear-gradient(to right, var(--orb-color-1), var(--orb-color-2));
      transition: width 0.05s ease-out;
    }
    .scroll-top-btn {
      display: none !important;
    }
  }

  /* ---------- Sidebar / Project Hub (Bento Card) ---------- */
  .sidebar {
    background: var(--panel);
    border: 2px solid var(--rule-strong);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 6px 6px 0px rgba(0, 240, 255, 0.15); /* Brutalist offset shadow */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    height: fit-content;
    position: sticky;
    top: 80px;
    transition: all 0.3s ease;
  }
  body.light-theme .sidebar {
    border-width: 1px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.04);
  }
  .sidebar-head {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orb-color-2);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  body.light-theme .sidebar-head {
    color: var(--ink);
    border-bottom-width: 1px;
  }
  .sidebar-head::after {
    content: 'ACTIVE';
    background: rgba(0, 240, 255, 0.1);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 9px;
    border: 1px solid var(--rule-strong);
  }
  body.light-theme .sidebar-head::after {
    background: rgba(15, 23, 42, 0.05);
    color: var(--ink);
  }
  .proj-list {
    max-height: 250px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .proj-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--rule);
    background: rgba(255,255,255,0.01);
    border-radius: 14px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  body.light-theme .proj-item {
    background: rgba(255,255,255,0.4);
  }
  .proj-item:hover {
    background: rgba(0, 240, 255, 0.04);
    border-color: var(--muted);
    transform: translateX(4px) scale(1.02);
  }
  body.light-theme .proj-item:hover {
    background: #ffffff;
    border-color: var(--rust);
  }
  .proj-item.active {
    background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 127, 0.02));
    border-color: var(--muted);
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
  }
  body.light-theme .proj-item.active {
    background: #ffffff;
    border-color: var(--rust);
    box-shadow: 0 4px 20px rgba(255, 94, 0, 0.12);
  }
  .proj-name {
    font-weight: 800;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .proj-type {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 3px;
  }
  body.light-theme .proj-type {
    color: var(--muted);
  }
  .proj-progress {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--orb-color-2);
    flex-shrink: 0;
    background: rgba(255, 0, 127, 0.08);
    border: 1px solid rgba(255, 0, 127, 0.15);
    padding: 3px 8px;
    border-radius: 6px;
  }
  body.light-theme .proj-progress {
    color: var(--rust);
    background: rgba(255, 94, 0, 0.08);
    border-color: rgba(255, 94, 0, 0.15);
  }
  .proj-del {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    padding: 0 4px;
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .proj-del:hover {
    color: var(--orb-color-2);
    transform: scale(1.2) rotate(90deg);
  }

  .add-project {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 2px solid var(--rule);
  }
  body.light-theme .add-project {
    border-top-width: 1px;
  }
  .add-project input, .add-project select {
    width: 100%;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--rule-strong);
    border-radius: 12px;
    color: var(--ink);
    padding: 12px 14px;
    font-size: 13.5px;
    margin-bottom: 10px;
    transition: all 0.2s ease;
  }
  body.light-theme .add-project input, body.light-theme .add-project select {
    background: #ffffff;
    border-color: var(--rule-strong);
  }
  .add-project input:focus, .add-project select:focus {
    border-color: var(--muted);
    outline: none;
    background: rgba(0, 0, 0, 0.45);
    box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.2);
  }
  body.light-theme .add-project input:focus, body.light-theme .add-project select:focus {
    border-color: var(--rust);
    box-shadow: 0 0 0 3px rgba(255, 94, 0, 0.15);
    background: #ffffff;
  }

  /* Tactical Neon Orange / Black Brutalist Button */
  .btn {
    background: var(--rust);
    color: #ffffff;
    border: 2px solid #000;
    border-radius: 12px;
    font-weight: 800;
    padding: 12px 20px;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: var(--font-body);
    width: 100%;
    cursor: pointer;
    box-shadow: 4px 4px 0px #000; /* Flat Brutalist shadow */
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
  }
  body.light-theme .btn {
    border: none;
    box-shadow: 0 4px 15px rgba(255, 94, 0, 0.35);
  }
  .btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0px #000;
  }
  body.light-theme .btn:hover {
    background: #ff761a;
    box-shadow: 0 6px 20px rgba(255, 94, 0, 0.5);
    transform: translateY(-1.5px);
  }
  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0px #000;
  }
  body.light-theme .btn:active {
    transform: translateY(0);
  }

  .template-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 10.5px;
    border: 1px solid var(--rule-strong);
    border-radius: 8px;
    color: var(--muted);
    padding: 6px 10px;
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  body.light-theme .chip {
    background: rgba(255,255,255,0.5);
    color: var(--muted);
  }
  .chip:hover {
    border-color: var(--muted);
    color: #fff;
    background: rgba(0, 240, 255, 0.12);
  }
  .chip.active {
    border-color: var(--muted);
    color: #fff;
    background: rgba(0, 240, 255, 0.15);
  }
  body.light-theme .chip:hover {
    border-color: var(--rust);
    color: var(--ink);
    background: #ffffff;
  }

  /* ---------- Right Side Dashboard ---------- */
  .dashboard {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ---------- Title Block Deck (Bento Card) ---------- */
  .titleblock {
    background: var(--panel);
    border: 2px solid var(--rule-strong);
    border-radius: 24px;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 6px 6px 0px rgba(0, 240, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  body.light-theme .titleblock {
    border-width: 1px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.04);
  }
  .titleblock::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 250px; height: 100%;
    background: radial-gradient(circle at 100% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  body.light-theme .titleblock::after {
    background: radial-gradient(circle at 100% 0%, rgba(255, 94, 0, 0.04) 0%, transparent 70%);
  }
  .tb-main { padding: 0; }
  .tb-eyebrow {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orb-color-2);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  body.light-theme .tb-eyebrow {
    color: var(--rust);
  }
  .tb-eyebrow::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--orb-color-2);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--orb-color-2);
    animation: pulse 1.5s infinite;
  }
  body.light-theme .tb-eyebrow::before {
    background: var(--rust);
    box-shadow: 0 0 10px var(--rust);
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }
  .tb-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #ffffff, var(--orb-color-1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
  }
  body.light-theme .tb-title {
    background: none;
    -webkit-text-fill-color: initial;
    color: var(--ink);
  }
  .tb-sub {
    color: var(--paper);
    opacity: 0.7;
    font-size: 13.5px;
    margin-top: 4px;
    font-weight: 500;
  }
  body.light-theme .tb-sub {
    color: var(--muted);
    opacity: 1;
  }
  .tb-grid {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .tb-cell {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    min-width: 100px;
    flex-shrink: 0;
  }
  body.light-theme .tb-cell {
    background: #ffffff;
    border: 1px solid var(--rule-strong);
  }
  .tb-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .tb-value {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--paper);
    margin-top: 4px;
  }
  body.light-theme .tb-value {
    color: var(--ink);
  }
  .tb-value.accent {
    color: var(--orb-color-1);
    text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
  }
  body.light-theme .tb-value.accent {
    color: var(--rust);
    text-shadow: none;
  }

  /* Circular Progress ring with glowing support */
  .progress-container {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 64px;
    height: 64px;
  }
  .progress-ring {
    transform: rotate(-90deg);
  }

  /* ============ STORAGE HELPERS ============ */
  async function storageGet(key){
    try{
      if(window.storage && typeof window.storage.get === 'function') {
        var r = await window.storage.get(key, false);
        return r ? JSON.parse(r.value) : null;
      } else {
        var r = localStorage.getItem(key);
        return r ? JSON.parse(r) : null;
      }
    }catch(e){ return null; }
  }
  async function storageSet(key, value){
    try{
      if(window.storage && typeof window.storage.set === 'function') {
        await window.storage.set(key, JSON.stringify(value), false);
        return true;
      } else {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      }
    }catch(e){ console.error('storage set failed', key, e); return false; }
  }
  async function storageDelete(key){
    try{
      if(window.storage && typeof window.storage.delete === 'function') {
        await window.storage.delete(key, false);
      } else {
        localStorage.removeItem(key);
      }
    }catch(e){ /* ignore */ }
  }

    return {

      }
    };
  }

  function getActivePhases(){
    var info = state.project && state.project.info;
    var hasFlatSlab = info && info.flatSlab;
    return PHASES.filter(function(p){
      if(p.id === 11) return !!hasFlatSlab;
      return true;
    });
  }

  function calculateTotalHeight(stories){
    var h = 0;
    stories.forEach(function(s){
      if(s.aboveGround !== false) {
        h += Math.abs(parseFloat(s.height) || 0);
      }
    });
    return parseFloat(h.toFixed(2));
  }

  function calculatePeriod(h, l){
    if (l <= 0) return 0;
    return parseFloat((0.09 * h / Math.sqrt(l)).toFixed(3));
  }

  async function init(){
    var list = await storageGet('projects-list');
    state.projects = list || [];
    var savedTheme = await storageGet('app-theme');

      document.body.classList.add('light-theme');
    } else {
      document.body.classList.remove('light-theme');
    }
    if(state.projects.length){
      await selectProject(state.projects[0].id, true);
    } else {
      state.ready = true;
      render();
    }
  }

  async function selectProject(id, skipRender){
    var proj = await storageGet('project:' + id);
    if(!proj) proj = emptyProjectData();
    
    // Ensure info block exists for legacy projects
    if(!proj.info){
      proj.info = {
        lx: 15,
        ly: 20,
        height: 9.4,
        zone: 0.16,
        iValue: 1,
        rValue: 5,
        awi: 'Active',
        windSpeed: 44,
        sbc: '200 kN/m² @ 1.5m',
        soilType: '2-Medium',
        flatSlab: false,
        stories: [
          {id: 's1', name: 'GF', height: 3.2, aboveGround: true},
          {id: 's2', name: 'SF', height: 3.1, aboveGround: true},
          {id: 's3', name: 'TF', height: 3.1, aboveGround: true}
        ]
      };
    }
    
    // Fix variables for existing projects
    if(!proj.info.sbc) proj.info.sbc = '200 kN/m² @ 1.5m';
    if(!proj.info.soilType) proj.info.soilType = '2-Medium';
    if(proj.info.flatSlab === undefined) proj.info.flatSlab = false;
    
    proj.info.stories.forEach(function(s){
      if(s.aboveGround === undefined) s.aboveGround = true;
    });
    
    state.currentId = id;
    state.project = proj;
    state.tab = 'info'; // Default tab when selecting a project
    state.openPhase = null;
    state.ready = true;
    render();
  }

  async function addProject(name, type){
    if(!name || !name.trim()) return;
    var id = 'p' + Date.now() + Math.floor(Math.random()*1000);
    state.projects.push({id:id, name:name.trim(), type:type});
    await storageSet('projects-list', state.projects);
    await storageSet('project:' + id, emptyProjectData());
    await selectProject(id);
  }

  async function deleteProject(id, evt){
    if(evt) evt.stopPropagation();
    state.projects = state.projects.filter(function(p){return p.id !== id;});
    await storageSet('projects-list', state.projects);
    await storageDelete('project:' + id);
    if(state.currentId === id){
      if(state.projects.length){ await selectProject(state.projects[0].id); }
      else { state.currentId = null; state.project = null; render(); }
    } else {
      render();
    }
  }

  function dcrClass(dcr){
    var v = parseFloat(dcr);
    if(isNaN(v)) return '';
    if(v > 1.0) return 'dcr-fail';
    if(v < 0.5) return 'dcr-warn';
    return 'dcr-ok';
  }

  function bindCodesSearch(){
    var box = document.getElementById('codes-search');
    if(!box) return;
    box.addEventListener('input', function(){
      var q = box.value.toLowerCase();
      document.querySelectorAll('#codes-table tbody tr').forEach(function(row){
        var s = row.getAttribute('data-search') || '';
        row.style.display = s.indexOf(q) === -1 ? 'none' : '';
      });
    });
  }

  function updateFckCalculations(){
    var select = document.getElementById('calc-fck');
    var results = document.getElementById('calc-fck-results');
    if(!select || !results) return;
    var fck = parseFloat(select.value);
    var ec = Math.round(5000 * Math.sqrt(fck));
    var fcr = parseFloat((0.7 * Math.sqrt(fck)).toFixed(2));
    var tc = parseFloat((0.25 * Math.sqrt(fck)).toFixed(2));
    
    results.innerHTML = 
      '<div><b>Ec (Elastic Modulus):</b> ' + ec.toLocaleString() + ' N/mm²</div>' +
      '<div><b>fcr (Flexural Strength):</b> ' + fcr + ' MPa</div>' +
      '<div><b>tc (Punching Shear Limit):</b> ' + tc + ' MPa</div>';
  }

  function esc(s){
    if(s===undefined||s===null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ---------- EVENTS ============ */
  function bindEvents(){
    document.querySelectorAll('[data-action]').forEach(function(el){
      var action = el.getAttribute('data-action');
      if(el._bound) return;
      el._bound = true;

      if(action==='select-project'){
        el.addEventListener('click', function(){ selectProject(el.getAttribute('data-id')); });
      }
      if(action==='delete-project'){
        el.addEventListener('click', function(e){ deleteProject(el.getAttribute('data-id'), e); });
      }
      if(action==='add-project'){
        el.addEventListener('click', function(){
          var name = document.getElementById('new-proj-name').value;
          var type = document.getElementById('new-proj-type').value;
          addProject(name, type);
        });
      }
      if(action==='quick-add'){
        el.addEventListener('click', function(){
          var t = PROJECT_TEMPLATES[parseInt(el.getAttribute('data-idx'),10)];
          addProject(t.name, t.type);
        });
      }
      if(action==='set-tab'){
        el.addEventListener('click', function(){ state.tab = el.getAttribute('data-tab'); render(); });
      }
      if(action==='toggle-phase'){
        el.addEventListener('click', function(){
          var id = parseInt(el.getAttribute('data-id'),10);
          state.openPhase = (state.openPhase===id) ? null : id;
          render();
        });
      }
      if(action==='toggle-done'){
        el.addEventListener('click', function(e){
          e.stopPropagation();
          var id = el.getAttribute('data-id');
          state.project.phases[id].done = !state.project.phases[id].done;
          saveCurrentProject();
          render();
        });
      }
      if(action==='note-input'){
        el.addEventListener('blur', function(){
          var id = el.getAttribute('data-id');
          state.project.phases[id].note = el.value;
          saveCurrentProject();
        });
      }
      if(action==='add-dcr'){
        el.addEventListener('click', function(){
          var member = document.getElementById('dcr-member').value.trim();
          var dcr = document.getElementById('dcr-value').value.trim();
          var combo = document.getElementById('dcr-combo').value.trim();
          var actionVal = document.getElementById('dcr-action').value;
          if(!member || !dcr) return;
          state.project.dcrLog.push({id:'r'+Date.now(), member:member, dcr:dcr, combo:combo, action:actionVal, note:''});
          saveCurrentProject();
          render();
          state.tab='dcr';
        });
      }
      if(action==='del-dcr'){
        el.addEventListener('click', function(){
          var id = el.getAttribute('data-id');
          state.project.dcrLog = state.project.dcrLog.filter(function(r){return r.id!==id;});
          saveCurrentProject();
          render();
        });
      }
      if(action==='toggle-theme'){
        el.addEventListener('click', function(){
          document.body.classList.toggle('light-theme');
          var isLight = document.body.classList.contains('light-theme');
          storageSet('app-theme', isLight ? 'light' : 'dark');
          render();
        });
      }
      if(action==='scroll-top'){
        el.addEventListener('click', function(){
          window.scrollTo({top: 0, behavior: 'smooth'});
        });
      }
      if(action==='update-info'){
        var handler = function(){
          var lx = parseFloat(document.getElementById('info-lx').value) || 0;
          var ly = parseFloat(document.getElementById('info-ly').value) || 0;
          var zone = parseFloat(document.getElementById('info-zone').value) || 0;
          var wind = parseFloat(document.getElementById('info-wind').value) || 0;
          var ivalue = parseFloat(document.getElementById('info-ivalue').value) || 0;
          var rvalue = parseFloat(document.getElementById('info-rvalue').value) || 0;
          var awi = document.getElementById('info-awi').value.trim();
          var sbc = document.getElementById('info-sbc').value.trim();
          var soil = document.getElementById('info-soil').value;
          var flatSlab = document.getElementById('info-flatslab').value === 'Yes';

          state.project.info.lx = lx;
          state.project.info.ly = ly;
          state.project.info.zone = zone;
          state.project.info.windSpeed = wind;
          state.project.info.iValue = ivalue;
          state.project.info.rValue = rvalue;
          state.project.info.awi = awi;
          state.project.info.sbc = sbc;
          state.project.info.soilType = soil;
          state.project.info.flatSlab = flatSlab;

          saveCurrentProject();
          render();
        };
        el.addEventListener('change', handler);
        el.addEventListener('blur', handler);
        el.addEventListener('keydown', function(e){
          if(e.key === 'Enter') {
            el.blur();
          }
        });
      }
      if(action==='delete-story'){
        el.addEventListener('click', function(){
          var idx = parseInt(el.getAttribute('data-idx'),10);
          state.project.info.stories.splice(idx, 1);
          saveCurrentProject();
          render();
        });
      }
      if(action==='add-story'){
        el.addEventListener('click', function(){
          var name = document.getElementById('new-story-name').value.trim();
          var heightInput = document.getElementById('new-story-height').value;
          var height = parseFloat(heightInput);
          if(!name || isNaN(height) || height === 0) return;
          
          state.project.info.stories.push({
            id: 's' + Date.now(),
            name: name,
            height: height,
            aboveGround: height > 0
          });
          saveCurrentProject();
          render();
        });
      }

      if(action==='toggle-story-above'){
        el.addEventListener('change', function(){
          var idx = parseInt(el.getAttribute('data-idx'),10);
          state.project.info.stories[idx].aboveGround = el.checked;
          saveCurrentProject();
          render();
        });
      }
      if(action==='export-project'){
        el.addEventListener('click', function(){
          if(!state.currentId || !state.project) {
            alert('Please select or create a project first.');
            return;
          }
          var currentProj = state.projects.find(function(p){return p.id===state.currentId;});
          var exportData = {
            metadata: currentProj,
            data: state.project
          };
          var str = JSON.stringify(exportData, null, 2);
          var blob = new Blob([str], {type: 'application/json'});
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = (currentProj.name || 'project') + '_companion_data.json';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          state.project.info.exported = true;
          saveCurrentProject();
          render();
        });
      }
      if(action==='import-project-trigger'){
        el.addEventListener('click', function(){
          document.getElementById('import-project-file').click();
        });
      }
      if(action==='export-dcr-csv'){
        el.addEventListener('click', function(){
          if(!state.project || !state.project.dcrLog || state.project.dcrLog.length === 0) return;
          var csv = 'Member,DCR,Governing Combo,Action Taken\n';
          state.project.dcrLog.forEach(function(row){
            csv += '"' + (row.member||'').replace(/"/g, '""') + '",' +
                   '"' + (row.dcr||'').replace(/"/g, '""') + '",' +
                   '"' + (row.combo||'').replace(/"/g, '""') + '",' +
                   '"' + (row.action||'').replace(/"/g, '""') + '"\n';
          });
          var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          var currentProj = state.projects.find(function(p){return p.id===state.currentId;});
          a.download = (currentProj ? currentProj.name : 'project') + '_DCR_log.csv';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });
      }
      if(action==='set-story-mode'){
        el.addEventListener('click', function(){
          state.storyAddMode = el.getAttribute('data-mode');
          render();
        });
      }
      if(action==='add-multiple-stories'){
        el.addEventListener('click', function(){
          var countInput = document.getElementById('mult-story-count').value;
          var heightInput = document.getElementById('mult-story-height').value;
          var count = parseInt(countInput,10);
          var height = parseFloat(heightInput);
          if(isNaN(count) || count < 1 || isNaN(height) || height === 0) return;
          
          for(var i = 0; i < count; i++){
            var num = state.project.info.stories.length + 1;
            state.project.info.stories.push({
              id: 's' + Date.now() + '_' + i,
              name: 'Story' + num,
              height: height,
              aboveGround: height > 0
            });
          }
          saveCurrentProject();
          render();
        });
      }
      if(action==='edit-story-name'){
        el.addEventListener('change', function(){
          var idx = parseInt(el.getAttribute('data-idx'),10);
          state.project.info.stories[idx].name = el.value.trim();
          saveCurrentProject();
          render();
        });
        el.addEventListener('keydown', function(e){
          if(e.key === 'Enter') el.blur();
        });
      }
      if(action==='edit-story-height'){
        el.addEventListener('change', function(){
          var idx = parseInt(el.getAttribute('data-idx'),10);
          var hVal = parseFloat(el.value);
          if(!isNaN(hVal) && hVal !== 0){
            state.project.info.stories[idx].height = hVal;
            saveCurrentProject();
          }
          render();
        });
        el.addEventListener('keydown', function(e){
          if(e.key === 'Enter') el.blur();
        });
      }
    });
    
    var fileInput = document.getElementById('import-project-file');
    if(fileInput && !fileInput._bound){
      fileInput._bound = true;
      fileInput.addEventListener('change', function(e){
        var file = e.target.files[0];
        if(!file) return;
        var reader = new FileReader();
        reader.onload = async function(evt){
          try {
            var imported = JSON.parse(evt.target.result);
            if(!imported.metadata || !imported.data){
              alert('Invalid file format. Make sure it is a project companion export file.');
              return;
            }
            var newId = 'p' + Date.now() + Math.floor(Math.random()*1000);
            imported.metadata.id = newId;
            if (imported.data && imported.data.info) {
              imported.data.info.exported = true;
            }
            state.projects.push(imported.metadata);
            await storageSet('projects-list', state.projects);
            await storageSet('project:' + newId, imported.data);
            await selectProject(newId);
            alert('Project "' + imported.metadata.name + '" imported successfully!');
          } catch(err) {
            alert('Failed to parse file: ' + err.message);
          }
        };
        reader.readAsText(file);
        fileInput.value = '';
      });
    }
  }

  function updateScrollIndicator(){
    var scrollTop = window.scrollY;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    var fill = document.getElementById('scroll-bar-fill');
    if(fill) {
      fill.style.setProperty('--scroll-pct', pct + '%');
    }
  }
  window.addEventListener('scroll', updateScrollIndicator);

  // Video scroll scrubbing setup
  (function(){
    var video = document.querySelector('.bg-video');
    if(!video) return;
    
    video.autoplay = false;
    video.loop = false;
    
    var targetTime = 0;
    var currentTime = 0;
    
    function updateTargetTime(){
      if(!video.duration) return;
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var pct = docHeight > 0 ? (scrollTop / docHeight) : 0;
      targetTime = pct * video.duration;
    }
    
    window.addEventListener('scroll', updateTargetTime);
    window.addEventListener('resize', updateTargetTime);
    
    function smoothScrub(){
      if(video.duration){
        currentTime += (targetTime - currentTime) * 0.12;
        if(currentTime < 0) currentTime = 0;
        if(currentTime > video.duration - 0.05) currentTime = video.duration - 0.05;
        video.currentTime = currentTime;
      }
      requestAnimationFrame(smoothScrub);
    }
    
    video.addEventListener('loadedmetadata', function(){
      updateTargetTime();
      requestAnimationFrame(smoothScrub);
    });
    if(video.readyState >= 1) {
      updateTargetTime();
      requestAnimationFrame(smoothScrub);
    }
  })();

  // Canvas Particles
  (function(){
    var canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100vw';
    canvas.style.height = '100vh';
    canvas.style.zIndex = '-2';
    canvas.style.pointerEvents = 'none';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    var particles = [];
    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    for(var i=0; i<35; i++){
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        size: Math.random() * 2 + 1,
        color: Math.random() > 0.5 ? '#00f0ff' : '#ff007f'
      });
    }
    function loop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      var isLight = document.body.classList.contains('light-theme');
      particles.forEach(function(p){
        p.x += p.vx;
        p.y += p.vy;
        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = isLight ? (p.color === '#00f0ff' ? '#ff5e00' : '#b45309') : p.color;
        ctx.shadowColor = isLight ? (p.color === '#00f0ff' ? '#ff5e00' : '#b45309') : p.color;
        ctx.shadowBlur = 8;
        ctx.fill();
      });
      requestAnimationFrame(loop);
    }
    loop();
  })();

  init();
})();
</script>
</body>
</html>
